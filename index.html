<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация по номеру телефона</title>
</head>
<body>
    <header>
        <h1>Вход в систему</h1>
    </header>

    <main>
        <!-- Шаг 1: ввод номера телефона -->
        <section id="step-phone" aria-labelledby="phone-heading">
            <h2 id="phone-heading">Вход по номеру телефона</h2>
            
            <form id="phone-form" method="post" novalidate>
                <div>
                    <label for="phone">Номер телефона</label>
                    <input type="tel" 
                           id="phone" 
                           name="phone" 
                           required
                           aria-required="true"
                           aria-describedby="phone-help"
                           autocomplete="tel"
                           placeholder="+7 (XXX) XXX-XX-XX">
                    <div id="phone-help">Введите номер в международном формате</div>
                </div>
                
                <button type="submit" id="send-code-btn" aria-label="Отправить код подтверждения">
                    Получить код
                </button>
            </form>
        </section>

        <!-- Шаг 2: ввод кода (изначально скрыт) -->
        <section id="step-code" aria-labelledby="code-heading" hidden>
            <h2 id="code-heading">Подтверждение кода</h2>
            
            <form id="code-form" method="post" novalidate>
                <div>
                    <label for="code">Код подтверждения</label>
                    <input type="text" 
                           id="code" 
                           name="code" 
                           required
                           aria-required="true"
                           aria-describedby="code-help"
                           autocomplete="off"
                           inputmode="numeric"
                           pattern="[0-9]{6}"
                           placeholder="123456">
                    <div id="code-help">Введите 6-значный код из SMS</div>
                </div>
                
                <div>
                    <button type="submit" id="verify-code-btn" aria-label="Подтвердить код">
                        Войти
                    </button>
                    <button type="button" id="resend-code-btn" aria-label="Отправить код повторно">
                        Отправить код повторно (<span id="countdown-timer" aria-live="polite">30</span> сек)
                    </button>
                </div>
                
                <button type="button" id="back-to-phone-btn" aria-label="Изменить номер телефона">
                    Изменить номер
                </button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2025 Все права защищены</p>
    </footer>

    <script>
        (function() {
            // DOM элементы
            const stepPhone = document.getElementById('step-phone');
            const stepCode = document.getElementById('step-code');
            const phoneForm = document.getElementById('phone-form');
            const phoneInput = document.getElementById('phone');
            const codeForm = document.getElementById('code-form');
            const codeInput = document.getElementById('code');
            const resendCodeBtn = document.getElementById('resend-code-btn');
            const backToPhoneBtn = document.getElementById('back-to-phone-btn');
            const countdownSpan = document.getElementById('countdown-timer');
            
            // Хранилище текущего номера и последнего отправленного кода
            let currentPhoneNumber = '';
            let lastSentCode = '';
            
            // Таймер
            let countdownInterval = null;
            let remainingSeconds = 0;
            let canResend = true;
            
            // Вспомогательная функция валидации номера
            function validatePhone(phoneNumber) {
                const digits = phoneNumber.replace(/\D/g, '');
                return digits.length >= 10;
            }
            
            // Функция генерации случайного 6-значного кода
            function generateCode() {
                return Math.floor(100000 + Math.random() * 900000).toString();
            }
            
            // Функция отправки кода (мок)
            function sendMockCode(phoneNumber) {
                const code = generateCode();
                lastSentCode = code;
                currentPhoneNumber = phoneNumber;
                
                // Мок-сообщение в alert
                alert(`Мок-сообщение: На номер ${phoneNumber} отправлен код авторизации ${code}`);
                
                // Для отладки в консоль (чтобы тестировать неправильный ввод)
                console.log(`[MOCK] Код для ${phoneNumber}: ${code}`);
            }
            
            // Запуск таймера на 30 секунд
            function startCountdown() {
                // Сбрасываем существующий таймер
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                }
                
                remainingSeconds = 30;
                canResend = false;
                updateCountdownDisplay();
                
                countdownInterval = setInterval(function() {
                    if (remainingSeconds <= 1) {
                        // Таймер закончился
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                        canResend = true;
                        countdownSpan.textContent = '0';
                        
                        // Анонсируем для скринридера
                        announceForScreenReader('Код можно отправить повторно. Кнопка отправки кода теперь активна.');
                    } else {
                        remainingSeconds--;
                        updateCountdownDisplay();
                    }
                }, 1000);
            }
            
            function updateCountdownDisplay() {
                countdownSpan.textContent = remainingSeconds;
                // Обновляем aria-label для кнопки с актуальным таймером
                if (!canResend) {
                    resendCodeBtn.setAttribute('aria-label', `Отправить код повторно. Доступно через ${remainingSeconds} секунд`);
                } else {
                    resendCodeBtn.setAttribute('aria-label', 'Отправить код повторно');
                }
            }
            
            // Остановка таймера и сброс состояния
            function stopCountdown() {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                canResend = true;
                remainingSeconds = 0;
                updateCountdownDisplay();
            }
            
            // Переход к шагу ввода кода
            function showCodeStep(phoneNumber) {
                // Прячем шаг с телефоном, показываем шаг с кодом
                stepPhone.hidden = true;
                stepCode.hidden = false;
                
                // Фокусируемся на поле ввода кода для удобства
                codeInput.focus();
                
                // Анонсируем для скринридера
                announceForScreenReader(`Код отправлен на номер ${phoneNumber}. Введите код подтверждения. Кнопка повторной отправки кода будет доступна через 30 секунд.`);
            }
            
            // Возврат к шагу ввода номера
            function showPhoneStep(resetCode = true) {
                // Останавливаем таймер
                stopCountdown();
                
                // Показываем шаг с телефоном, скрываем шаг с кодом
                stepPhone.hidden = false;
                stepCode.hidden = true;
                
                if (resetCode) {
                    // Очищаем сохранённые данные
                    currentPhoneNumber = '';
                    lastSentCode = '';
                    codeInput.value = '';
                }
                
                // Фокусируемся на поле телефона
                phoneInput.focus();
            }
            
            // Функция для анонса скринридеру
            function announceForScreenReader(message) {
                const announcer = document.getElementById('aria-announcer');
                if (announcer) {
                    announcer.textContent = message;
                    setTimeout(() => {
                        if (announcer.textContent === message) {
                            announcer.textContent = '';
                        }
                    }, 5000);
                }
            }
            
            // Создаём скрытую область для анонсов скринридера
            function createAnnouncer() {
                const announcer = document.createElement('div');
                announcer.id = 'aria-announcer';
                announcer.setAttribute('aria-live', 'polite');
                announcer.setAttribute('aria-atomic', 'true');
                announcer.className = 'sr-only';
                announcer.style.position = 'absolute';
                announcer.style.width = '1px';
                announcer.style.height = '1px';
                announcer.style.padding = '0';
                announcer.style.margin = '-1px';
                announcer.style.overflow = 'hidden';
                announcer.style.clip = 'rect(0, 0, 0, 0)';
                announcer.style.border = '0';
                document.body.appendChild(announcer);
                return announcer;
            }
            
            createAnnouncer();
            
            // ========== Обработчик отправки номера телефона ==========
            phoneForm.addEventListener('submit', function(event) {
                event.preventDefault();
                
                const phoneNumber = phoneInput.value.trim();
                
                // Валидация
                if (!phoneNumber) {
                    const msg = 'Пожалуйста, введите номер телефона.';
                    alert(msg);
                    announceForScreenReader(msg);
                    phoneInput.focus();
                    return;
                }
                
                if (!validatePhone(phoneNumber)) {
                    const msg = 'Введите корректный номер телефона (минимум 10 цифр).';
                    alert(msg);
                    announceForScreenReader(msg);
                    phoneInput.focus();
                    return;
                }
                
                // Отправляем мок-код
                sendMockCode(phoneNumber);
                
                // Запускаем таймер перед тем, как покажем шаг с кодом
                startCountdown();
                
                // Переходим к шагу ввода кода
                showCodeStep(phoneNumber);
            });
            
            // ========== Обработчик подтверждения кода ==========
            codeForm.addEventListener('submit', function(event) {
                event.preventDefault();
                
                const enteredCode = codeInput.value.trim();
                
                if (!enteredCode) {
                    const msg = 'Пожалуйста, введите код подтверждения.';
                    alert(msg);
                    announceForScreenReader(msg);
                    codeInput.focus();
                    return;
                }
                
                // Проверяем код
                if (enteredCode === lastSentCode) {
                    // Код правильный — успешная авторизация
                    const successMsg = `Добро пожаловать! Вы успешно авторизовались по номеру ${currentPhoneNumber}`;
                    alert(successMsg);
                    announceForScreenReader(successMsg);
                    
                    // Здесь мог бы быть редирект или сброс формы
                    // Для демонстрации возвращаемся к началу
                    showPhoneStep(true);
                    phoneInput.value = '';
                } else {
                    // Неправильный код — возвращаем к вводу номера
                    const errorMsg = `Неверный код. Возврат к вводу номера телефона.`;
                    alert(errorMsg);
                    announceForScreenReader(errorMsg);
                    
                    // Сбрасываем всё и показываем шаг с телефоном
                    showPhoneStep(true);
                    phoneInput.value = currentPhoneNumber; // Подставляем последний номер для удобства
                    phoneInput.focus();
                    
                    // Дополнительное пояснение
                    const retryMsg = `Попробуйте снова или введите другой номер.`;
                    announceForScreenReader(retryMsg);
                }
            });
            
            // ========== Обработчик повторной отправки кода ==========
            resendCodeBtn.addEventListener('click', function() {
                if (!canResend) {
                    const msg = `Повторная отправка будет доступна через ${remainingSeconds} секунд. Пожалуйста, подождите.`;
                    alert(msg);
                    announceForScreenReader(msg);
                    // Возвращаем фокус на кнопку, чтобы пользователь мог попробовать позже
                    resendCodeBtn.focus();
                    return;
                }
                
                if (!currentPhoneNumber) {
                    // На всякий случай, если нет номера
                    announceForScreenReader('Номер телефона не найден. Возврат к вводу номера.');
                    showPhoneStep(true);
                    return;
                }
                
                // Отправляем новый код на тот же номер
                sendMockCode(currentPhoneNumber);
                
                // Перезапускаем таймер
                startCountdown();
                
                const msg = `Новый код отправлен на номер ${currentPhoneNumber}`;
                alert(msg);
                announceForScreenReader(msg);
                
                // Очищаем поле ввода кода
                codeInput.value = '';
                codeInput.focus();
            });
            
            // ========== Обработчик кнопки "Изменить номер" ==========
            backToPhoneBtn.addEventListener('click', function() {
                showPhoneStep(true);
                phoneInput.value = '';
                phoneInput.focus();
                
                const msg = 'Вы можете изменить номер телефона';
                announceForScreenReader(msg);
            });
            
            // Дополнительно: обновляем aria-live для таймера при каждом изменении
            // (уже есть aria-live="polite" на самом countdownSpan)
            
            // Очистка таймера при уходе со страницы
            window.addEventListener('beforeunload', function() {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                }
            });
        })();
    </script>
</body>
</html>
